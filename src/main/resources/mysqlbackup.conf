mysql {
  source {
    url = "jdbc:mysql://localhost:3306/gs?useSSL=false&allowPublicKeyRetrieval=true"
    user = "root"
    password = "123456"
    driver = "com.mysql.cj.jdbc.Driver"
  }

  target {
    url = "jdbc:mysql://localhost:3306/gs?useSSL=false&allowPublicKeyRetrieval=true"
    user = "root"
    password = "123456"
    driver = "com.mysql.cj.jdbc.Driver"
  }
}

spark {
  master = "local[*]"
  appName = "MySQLBackupRestore"

  jdbc {
    batchsize = 100000
    fetchsize = 100000
  }
}

backup {
  basePath = "file:///H:/mysql_backup/gs3"  # Windows路径
  # basePath = "file:///backup/mysql_backup"   # Linux路径

  ddlDir = "ddl"
  dataDir = "parquet"
  progressFile = "backup_progress.txt"
  errorLog = "backup_errors.log"

  # 表并行度（控制同时备份的表数量）
  tableParallelism = 2

  # 要跳过的表（支持正则表达式）
  skipTables = [
    "data_east_dzgpssgn",
    "data_gsdt",
    "data2025_zshq_ths",
    "data_gpsj_day_%",
    "data2024_zjlx",
    "analysis_news2026"
  ]

  # 跳过没有主键的表
  skipTablesWithoutPrimaryKey = false

  # 最大重试次数
  maxRetryCount = 3

  # 每个表备份的超时时间（分钟）
  tableTimeoutMinutes = 30
}

restore {
  progressFile = "restore_progress.txt"
  errorLog = "restore_errors.log"

  # 表并行度（控制同时恢复的表数量）
  tableParallelism = 1

  # 要跳过的表（支持正则表达式）
  skipTables = []

  # 恢复策略：OVERWRITE（覆盖）、APPEND（追加）、TRUNCATE（清空后加载）
  restoreStrategy = "OVERWRITE"

  # 如果表已存在，是否跳过恢复
  skipIfTableExists = false

  # 恢复时是否保留索引和外键
  preserveIndexesAndConstraints = false
}